# This workflow will build and test a full-stack application: 
# Spring Boot Java backend (Maven) and React Node.js frontend (npm).

name: Full Stack CI (Spring Boot & React)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # ==========================================
  # JOB 1: BACKEND (SPRING BOOT)
  # ==========================================
  backend-build:
    name: Build & Test Backend
    runs-on: ubuntu-latest

    # If your backend is in a subfolder, uncomment and adjust the lines below:
    defaults:
      run:
        working-directory: ./careergraph

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    # The package phase automatically runs the test phase in Maven
    - name: Test and Build with Maven
      run: mvn -B package --file pom.xml

    - name: Update dependency graph
      uses: advanced-security/maven-dependency-submission-action@571e99aab1055c2e71a1e2309b9691de18d6b7d6

  # ==========================================
  # JOB 2: FRONTEND (REACT / NODE.JS)
  # ==========================================
  frontend-build:
    name: Build & Test Frontend
    runs-on: ubuntu-latest

    # Tells GitHub Actions to run all npm commands inside your frontend folder
    defaults:
      run:
        working-directory: ./frontend # Change this if your folder is named differently

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20' # Adjust to match your project's Node version
        cache: 'npm'
        cache-dependency-path: './frontend/package-lock.json' # Adjust path as needed

    # npm ci is preferred in CI environments over npm install for clean, reliable installs
    - name: Install Dependencies
      run: npm ci

    - name: Run Tests
      run: npm test
      env:
        CI: true # Forces tests (like Jest) to run non-interactively and exit

    - name: Build React App
      run: npm run build
